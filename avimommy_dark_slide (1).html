<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 1280px; height: 720px; overflow: hidden; background: transparent; }
.slide {
  width: 1280px; height: 720px;
  font-family: 'Inter', Arial, sans-serif;
  display: grid; grid-template-columns: 1fr 1fr;
}
.vhalf { background: #0f0f0f; display: flex; align-items: center; justify-content: center; }
.vp { display: flex; flex-direction: column; align-items: center; gap: 14px; opacity: .2; color: #fff; }
.vp-ring { width: 64px; height: 64px; border-radius: 50%; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; }
.vp-tri { width:0; height:0; border-style:solid; border-width:12px 0 12px 22px; border-color:transparent transparent transparent #fff; margin-left:5px; }
.vp-lbl { font-size: 13px; font-weight: 700; letter-spacing: .1em; }
.thalf { background: #141414; display: flex; flex-direction: column; padding: 52px 64px 56px; }
.handle { display: flex; align-items: center; gap: 10px; }
.av { width: 34px; height: 34px; border-radius: 50%; background: #C5D831; color: #2a3800; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; }
.hname { font-size: 15px; font-weight: 500; color: #555; font-family: 'Inter', Arial, sans-serif; }
.main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
.emo { font-size: 80px; line-height:1; margin-bottom: 20px; }
.hl { font-size: 58px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; color: #fff; font-family: 'Inter', Arial, sans-serif; }
.acc { color: #C5D831; }
</style>
</head>
<body>
<div class="slide" data-document-role="page" data-label="Тёмная версия — avi.mommy">
  <div class="vhalf"><div class="vp"><div class="vp-ring"><div class="vp-tri"></div></div><div class="vp-lbl">ВИДЕО</div></div></div>
  <div class="thalf">
    <div class="handle"><div class="av">A</div><span class="hname">avi.mommy</span></div>
    <div class="main">
      <div class="emo">🎯</div>
      <div class="hl">Как выбрать<br><span class="acc">прибыльную</span><br>нишу?</div>
    </div>
  </div>
</div>
</body>
</html>
