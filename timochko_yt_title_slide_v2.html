
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .slide {
    background: #EBEBEB;
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    aspect-ratio: 16/9;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    position: relative;
  }
  .left {
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .video-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0.35;
  }
  .video-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 3px solid #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .video-icon::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #fff;
    margin-left: 4px;
  }
  .video-label {
    color: #fff;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .right {
    display: flex;
    flex-direction: column;
    padding: 22px 28px 26px;
  }
  .handle {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: auto;
  }
  .handle-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #21D67A, #1A8FD1);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900; color: #fff;
    flex-shrink: 0;
  }
  .handle-name {
    font-size: 12px; font-weight: 500; color: #666;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .emoji-big {
    font-size: 44px;
    line-height: 1;
    margin-bottom: 14px;
    display: block;
  }
  .headline {
    font-size: 34px;
    font-weight: 900;
    color: #111;
    line-height: 1.13;
    letter-spacing: -0.02em;
  }
  .headline .green {
    background: linear-gradient(90deg, #1FC76A, #1A8FD1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>

<h2 class="sr-only">Слайд Тимочко для YouTube — левая половина под видео, правая с текстом</h2>

<div class="slide">
  <div class="left">
    <div class="video-placeholder">
      <div class="video-icon"></div>
      <div class="video-label">ВИДЕО</div>
    </div>
  </div>

  <div class="right">
    <div class="handle">
      <div class="handle-avatar">A</div>
      <span class="handle-name">avi.mommy</span>
    </div>

    <div class="main">
      <span class="emoji-big">🎯</span>
      <div class="headline">
        Как выбрать<br>
        <span class="green">прибыльную</span><br>
        нишу?
      </div>
    </div>
  </div>
</div>

<div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; font-family:'Inter',sans-serif;">
  <button onclick="sendPrompt('Сделай следующий слайд в этом же стиле — левая половина под видео, правая: одна мысль про 3 критерия живой ниши')">Слайд 2 ↗</button>
  <button onclick="sendPrompt('Сделай тёмный вариант этого слайда — чёрный фон справа, белый жирный текст, жёлтый акцент вместо зелёного')">Тёмная версия ↗</button>
</div>
